services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Run a real H2 TCP server (see DuaBiskutTelurApplication.main) so DBeaver
      # can connect over an SSH tunnel. The app itself connects as a TCP client
      # too. Loopback-only port mapping below + tunnel — never expose publicly
      # (the DB user has no password).
      H2_TCP_PORT: 9092
      H2_TCP_BASEDIR: /app/data
      SPRING_DATASOURCE_URL: jdbc:h2:tcp://localhost:9092/duabiskuttelur
      # Every "today" boundary (dashboard, water counter, streaks, weight
      # buckets) is computed from ZoneId.systemDefault() — without this the
      # container defaults to UTC and the day rolls over at 8am local time.
      TZ: Asia/Kuala_Lumpur
    volumes:
      - backend-data:/app/data
    expose:
      - "8080"
    ports:
      - "127.0.0.1:9092:9092"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Bound to loopback only — the host's native nginx (which may serve
      # other sites on the same machine) reverse-proxies the public domain
      # here. Bind "80:80" instead if this is the only site on the host.
      - "127.0.0.1:8081:80"

volumes:
  backend-data:
