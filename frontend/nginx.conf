# --- Restore the real client IP before anything keys on it ------------------
# This container only ever sees its direct upstream (the host nginx over the
# docker bridge), so a raw $binary_remote_addr would put EVERY user into one
# shared rate-limit bucket. Trust the private-range hops (docker bridge + host
# nginx) and Cloudflare's published edges, then walk X-Forwarded-For right to
# left past trusted proxies — $remote_addr becomes the actual client address.
# Spoofing stays closed: a client-forged XFF entry is leftmost, and recursion
# stops at the first untrusted address it meets. Requires the host nginx to
# send X-Forwarded-For (it must, for the OAuth proto chain to work at all).
set_real_ip_from 127.0.0.1;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
# Cloudflare IPv4 ranges — https://www.cloudflare.com/ips/ (synced 2026-07;
# re-check when Cloudflare announces changes).
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# Anonymous, unauthenticated endpoints (see SecurityConfig.java permitAll) that
# trigger a paid Gemini call or an outbound OpenFoodFacts lookup per request —
# throttle per-IP so a scripted loop can't burn API quota / cost with no
# account barrier in front of it.
limit_req_zone $binary_remote_addr zone=analyze_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=barcode_zone:10m rate=30r/m;
limit_req_status 429;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers — this app has none today. CSP is deliberately
    # left off here: it needs a report-only rollout against every asset/API/
    # OAuth path before it can be enforced without risking breakage.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Camera is used for meal photos and barcode scanning — keep it available
    # to this origin, lock down everything else this app doesn't use.
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    # Never cache the app shell / service worker so PWA updates roll out promptly.
    # nginx's add_header doesn't inherit into a location that sets its own —
    # these two need the same security headers as the server block repeated,
    # or they'd silently lose them the moment Cache-Control is added here.
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints every filename with a content hash, so a cached copy
    # can never go stale under a URL that stays the same — safe to cache for
    # a year instead of inheriting the 4h default.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    }

    # Unauthenticated (permitAll) endpoints get their own location so the
    # rate-limit zones above apply — longest-prefix/exact match wins over the
    # generic /api/ block below regardless of declaration order.
    location = /api/analyze {
        limit_req zone=analyze_zone burst=5 nodelay;
        proxy_pass http://backend:8080/api/analyze;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 12M;
        # Analyze can legitimately take a while when Gemini retries across
        # fallback models — don't 504 at nginx's 60s default.
        proxy_read_timeout 120s;
    }

    location /api/barcode/ {
        limit_req zone=barcode_zone burst=10 nodelay;
        proxy_pass http://backend:8080/api/barcode/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Backend API — proxied to the Spring Boot container on the compose network.
    # X-Forwarded-Proto is passed through from the host nginx (which sets it to
    # "https" for Cloudflare traffic) so OAuth redirect URIs and secure cookies
    # are correct behind the TLS-terminating proxy.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 12M;
        # Analyze can legitimately take a while when Gemini retries across
        # fallback models — don't 504 at nginx's 60s default.
        proxy_read_timeout 120s;
    }

    # OAuth2 login initiation and Google's callback live on the backend, not the
    # SPA — proxy them through so they don't fall into the index.html fallback.
    location /oauth2/ {
        proxy_pass http://backend:8080/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
    }
    location /login/oauth2/ {
        proxy_pass http://backend:8080/login/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
    }
}
